{{ define "dashboard.html" }}
{{ template "base" . }}
{{ end }}

{{ define "content" }}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-semibold">My Reports</h1>
  <button x-data @click="$refs.create.classList.toggle('hidden')"
          class="bg-indigo-600 text-white px-4 py-2 rounded">New Report</button>
</div>

<form x-ref="create" method="POST" action="/reports" class="hidden mb-6 bg-white p-4 rounded shadow">
  <input name="title" placeholder="Report title" required class="border rounded p-2 mr-2">
  <button class="bg-slate-800 text-white px-3 py-2 rounded">Create</button>
</form>

<div class="bg-white rounded shadow divide-y">
  {{ range .Reports }}
    <div class="p-4 flex items-center justify-between">
      <div>
        <p class="font-medium">{{ .Title }}</p>
        <p class="text-sm text-slate-500">{{ .Status }} · {{ .CreatedAt.Format "2006-01-02" }}</p>
      </div>
      {{ if eq (printf "%s" .Status) "draft" }}
      <form method="POST" action="/reports/{{ .ID }}/submit">
        <button class="text-sm bg-emerald-600 text-white px-3 py-1 rounded">Submit</button>
      </form>
      {{ end }}
    </div>
  {{ else }}
    <p class="p-4 text-slate-500">No reports yet.</p>
  {{ end }}
</div>
{{ end }}
